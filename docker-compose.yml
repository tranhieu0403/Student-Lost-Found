# Base compose: 3 service fe (nginx) + be (Node) + db (MySQL 8)
# Dev override: docker-compose.dev.yml (hot reload + Vite dev server)
services:
  db:
    image: mysql:8.0
    container_name: slf_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - app-network
    restart: unless-stopped

  be:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slf_be
    env_file:
      - .env
    ports:
      - "${BE_PORT:-5000}:5000"
    volumes:
      # Persist uploaded images across container restarts
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  fe:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slf_fe
    ports:
      - "${FE_PORT:-80}:80"
    depends_on:
      - be
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
